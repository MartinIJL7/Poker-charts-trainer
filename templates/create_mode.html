<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Работа с режимами</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='create_mode.css') }}">
</head>
<body class="create-page">   <!-- добавили класс для единого фона и отступов -->

    <!-- Верхняя строка с заголовком и ссылкой "На главную" -->
    <div class="header-row">
        <h1>📋 Работа с режимами</h1>
        <a href="{{ url_for('index') }}" class="home-link">🏠 На главную</a>
    </div>

    <!-- Кнопка показа/скрытия режимов -->
    <div style="margin: 20px 0;">
        <button id="toggle-modes-btn" class="btn-secondary">📂 Показать существующие режимы</button>
    </div>

    <!-- Таблица с режимами (скрыта по умолчанию) -->
    <div id="modes-container" style="display: none;">
        <table class="modes-table">
            <thead>
                <tr>
                    <th>Название режима</th>
                    <th>Диапазоны</th>
                </tr>
            </thead>
            <tbody id="modes-tbody">
                <!-- строки будут добавлены через JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- Основной блок создания режима -->
    <div class="create-mode-container">
        <div class="form-group">
            <label for="mode-name">Название режима:</label>
            <input type="text" id="mode-name" placeholder="например, RFI">
        </div>
        <div class="positions-list">
            <h3>Выберите диапазоны для включения в режим:</h3>
            {% if positions %}
                <ul id="positions-ul">
                    {% for pos in positions %}
                        <li>
                            <label>
                                <input type="checkbox" class="position-checkbox" value="{{ pos }}">
                                {{ pos }}
                            </label>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="warning">Нет доступных диапазонов. Сначала создайте диапазоны.</p>
            {% endif %}
        </div>
        <div class="actions">
            <button id="save-mode-btn" class="btn-success" {% if not positions %}disabled{% endif %}>💾 Сохранить режим</button>
            <button id="clear-mode-btn" class="btn-secondary">Снять все</button>
        </div>
        <!-- старая ссылка внизу УДАЛЕНА -->
    </div>

    <script src="{{ url_for('static', filename='create_mode.js') }}"></script>
</body>
</html>
