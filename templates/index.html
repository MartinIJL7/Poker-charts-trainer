<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тренировка по покерным чартам</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>📊 Тренировка по покерным чартам</h1>

    {% if no_modes %}
        <p class="warning">⚠️ Нет доступных режимов, создайте их по кнопке ниже.</p>
    {% else %}
        <h2>Выберите режим:</h2>
        <ul class="mode-list">
        {% for mode_name in modes %}
            <li><a href="{{ url_for('training', mode=mode_name) }}">{{ mode_name }}</a></li>
        {% endfor %}
        </ul>
    {% endif %}

    <p>
        <a href="{{ url_for('create_range') }}">📝 Работа с диапазонами</a> |
        <a href="{{ url_for('create_mode') }}">📋 Работа с режимами</a> |
        <a href="{{ url_for('config_management') }}">💾 Работа с конфигами</a>
    </p>

    <!-- Небольшая ссылка на отладку (незаметная) -->
    <p style="font-size:0.8em; color:#999; margin-top:10px;">
        <a href="{{ url_for('debug') }}" style="color:#999; text-decoration:none;">🐞 Отладка</a>
    </p>
</body>
</html>
