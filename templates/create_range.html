<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Создание диапазона</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='create_range.css') }}">
</head>
<body class="create-page">
    <div class="header-row">
        <h1>📝 Создание нового диапазона</h1>
        <a href="{{ url_for('index') }}" class="home-link">🏠 На главную</a>
    </div>

    <div class="create-container">
        <div class="top-row">
            <div class="form-group">
                <label for="position">Название диапазона:</label>
                <div class="position-input-wrapper">
                    <input type="text" id="position" placeholder="RFI_UTG" value="">
                    <button id="save-range-btn" class="btn-success">💾 Сохранить диапазон</button>
                </div>
                <small>Используйте символ "_" вместо пробела</small>
            </div>
        </div>

        <div class="two-columns">
            <div class="left-column">
                <h3>Матрица рук</h3>
                <div id="hand-matrix"></div>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    <label for="color-picker" style="margin: 0;">Цвет:</label>
                    <input type="color" id="color-picker" value="#3498db">
                    <button id="clear-selection-btn" class="btn-secondary" style="height: 30px; padding: 0 12px; font-size: 0.9em;">✖ Убрать всё выделение</button>
                </div>
            </div>

            <div class="right-column">
                <h3>Добавленные поддиапазоны</h3>
                <ul id="subrange-list-ul"></ul>
                <p id="empty-message" style="color: #888; font-style: italic;">Пока нет поддиапазонов</p>

                <div class="subrange-add-area">
                    <input type="hidden" id="edit-id" value="">
                    <input type="text" id="subname" placeholder="Название поддиапазона (например, 100% RFI)" style="width: 100%; padding: 6px; box-sizing: border-box; margin-bottom: 6px;">
                    <div class="subrange-actions">
                        <button id="save-subrange-btn" class="btn-success">✅ Добавить поддиапазон</button>
                        <button id="cancel-edit-btn" class="btn-secondary" style="display: none;">Отменить</button>
                    </div>
                </div>

                <div style="margin-top: 10px;">
                    <button id="clear-all-btn" class="btn-danger" style="width: 100%;">🗑 Очистить все</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='create_range.js') }}"></script>
</body>
</html>
